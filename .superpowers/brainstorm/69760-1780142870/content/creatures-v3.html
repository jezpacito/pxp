<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenney Characters v3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0d0d1a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 20px; gap: 20px; }
  h2 { font-size: 1.4rem; text-align: center; }
  .subtitle { color: #aaa; font-size: 0.9rem; text-align: center; }

  .scene {
    background: linear-gradient(180deg, #b8e4ff 0%, #d9f0ff 50%, #5cb85c 50%, #4a8f3f 100%);
    border-radius: 20px;
    width: 100%;
    max-width: 720px;
    height: 300px;
    position: relative;
    overflow: hidden;
    border: 4px solid #333;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .cloud { position: absolute; background: white; border-radius: 50px; }
  .tile {
    position: absolute; bottom: 0;
    width: 64px; height: 64px;
    background: #5cb85c;
    border-top: 5px solid #7dcc7d;
    border-left: 3px solid #7dcc7d;
    border-right: 3px solid #3a7a30;
    border-bottom: 3px solid #3a7a30;
  }
  .platform {
    position: absolute; height: 22px;
    background: #5cb85c;
    border-radius: 10px;
    border-top: 5px solid #7dcc7d;
    border-left: 3px solid #7dcc7d;
    border-right: 3px solid #3a7a30;
    border-bottom: 3px solid #3a7a30;
  }
  .nametag {
    font-size: 12px; font-weight: bold; letter-spacing: 1px;
    background: rgba(0,0,0,0.55); border-radius: 12px; padding: 3px 12px;
    margin-top: 6px;
  }
  @keyframes idle  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes idle2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.25)} }
  @keyframes coin  { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-6px) rotate(10deg)} }
</style>
</head>
<body>

<h2>Jez & Mae — Kenney Style ✓</h2>
<p class="subtitle">Copied straight from the pack: big helmet ring, round body, stubby arms & feet</p>

<div class="scene">
  <!-- clouds -->
  <div class="cloud" style="width:110px;height:34px;top:22px;left:20px;"></div>
  <div class="cloud" style="width:70px;height:22px;top:16px;left:60px;"></div>
  <div class="cloud" style="width:120px;height:36px;top:20px;right:40px;"></div>
  <div class="cloud" style="width:60px;height:20px;top:14px;right:35px;"></div>

  <!-- floating platform -->
  <div class="platform" style="width:130px;bottom:120px;left:50%;transform:translateX(-50%);"></div>

  <!-- coin -->
  <div style="position:absolute;bottom:145px;left:calc(50% - 30px);font-size:20px;animation:coin 1.2s ease-in-out infinite;">🪙</div>
  <div style="position:absolute;bottom:145px;left:calc(50% + 10px);font-size:20px;animation:coin 1.2s ease-in-out infinite;animation-delay:0.3s;">🪙</div>

  <!-- heart -->
  <div style="position:absolute;bottom:80px;left:50%;font-size:28px;animation:pulse 1.3s ease-in-out infinite;z-index:5;">💕</div>

  <!-- tiles -->
  <div class="tile" style="left:0;"></div><div class="tile" style="left:64px;"></div>
  <div class="tile" style="left:128px;"></div><div class="tile" style="left:192px;"></div>
  <div class="tile" style="left:256px;"></div><div class="tile" style="left:320px;"></div>
  <div class="tile" style="left:384px;"></div><div class="tile" style="left:448px;"></div>
  <div class="tile" style="left:512px;"></div><div class="tile" style="left:576px;"></div>
  <div class="tile" style="left:640px;"></div>

  <!-- ═══ JEZ (pink) ═══ -->
  <div style="position:absolute;bottom:64px;left:130px;display:flex;flex-direction:column;align-items:center;animation:idle 1.9s ease-in-out infinite;">
    <svg width="80" height="96" viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
      <!-- shadow -->
      <ellipse cx="40" cy="94" rx="20" ry="4" fill="rgba(0,0,0,0.2)"/>

      <!-- left arm (tiny oval sticking out) -->
      <ellipse cx="11" cy="66" rx="8" ry="6" fill="#FF6B9D" stroke="#222" stroke-width="2.5" transform="rotate(-20 11 66)"/>
      <!-- right arm -->
      <ellipse cx="69" cy="66" rx="8" ry="6" fill="#FF6B9D" stroke="#222" stroke-width="2.5" transform="rotate(20 69 66)"/>

      <!-- body (round, smaller than head) -->
      <ellipse cx="40" cy="72" rx="21" ry="18" fill="#FF6B9D" stroke="#222" stroke-width="3"/>

      <!-- left foot -->
      <ellipse cx="28" cy="87" rx="10" ry="6" fill="#FF6B9D" stroke="#222" stroke-width="2.5"/>
      <!-- right foot -->
      <ellipse cx="52" cy="87" rx="10" ry="6" fill="#FF6B9D" stroke="#222" stroke-width="2.5"/>

      <!-- helmet outer ring (thick dark border = the "ring" from image) -->
      <circle cx="40" cy="36" r="32" fill="#FF6B9D" stroke="#222" stroke-width="4"/>
      <!-- helmet visor / face area (lighter inner circle) -->
      <circle cx="40" cy="36" r="24" fill="#ffe8d0" stroke="#444" stroke-width="2"/>
      <!-- visor glare top-left -->
      <ellipse cx="30" cy="24" rx="7" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-25 30 24)"/>

      <!-- LEFT EYE -->
      <ellipse cx="30" cy="37" rx="6" ry="7" fill="white" stroke="#222" stroke-width="1.5"/>
      <circle cx="30" cy="37" r="4" fill="#222"/>
      <circle cx="31.5" cy="35" r="1.8" fill="white"/>
      <!-- RIGHT EYE -->
      <ellipse cx="50" cy="37" rx="6" ry="7" fill="white" stroke="#222" stroke-width="1.5"/>
      <circle cx="50" cy="37" r="4" fill="#222"/>
      <circle cx="51.5" cy="35" r="1.8" fill="white"/>

      <!-- blush -->
      <ellipse cx="20" cy="44" rx="5.5" ry="3" fill="#FF9DC8" opacity="0.7"/>
      <ellipse cx="60" cy="44" rx="5.5" ry="3" fill="#FF9DC8" opacity="0.7"/>

      <!-- smile -->
      <path d="M31 47 Q40 54 49 47" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- bow on top of helmet -->
      <path d="M28 7 L38 13 L28 19 Z" fill="#FF3D7F" stroke="#222" stroke-width="2"/>
      <path d="M52 7 L42 13 L52 19 Z" fill="#FF3D7F" stroke="#222" stroke-width="2"/>
      <circle cx="40" cy="13" r="5" fill="#FFB3D1" stroke="#222" stroke-width="2"/>
    </svg>
    <div class="nametag" style="color:#ff9dc8;">JEZ</div>
  </div>

  <!-- ═══ MAE (purple) ═══ -->
  <div style="position:absolute;bottom:64px;right:130px;display:flex;flex-direction:column;align-items:center;animation:idle2 2.1s ease-in-out infinite;animation-delay:0.6s;">
    <svg width="80" height="96" viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
      <!-- shadow -->
      <ellipse cx="40" cy="94" rx="20" ry="4" fill="rgba(0,0,0,0.2)"/>

      <!-- left arm -->
      <ellipse cx="11" cy="66" rx="8" ry="6" fill="#C084FC" stroke="#222" stroke-width="2.5" transform="rotate(-20 11 66)"/>
      <!-- right arm -->
      <ellipse cx="69" cy="66" rx="8" ry="6" fill="#C084FC" stroke="#222" stroke-width="2.5" transform="rotate(20 69 66)"/>

      <!-- body -->
      <ellipse cx="40" cy="72" rx="21" ry="18" fill="#C084FC" stroke="#222" stroke-width="3"/>

      <!-- left foot -->
      <ellipse cx="28" cy="87" rx="10" ry="6" fill="#C084FC" stroke="#222" stroke-width="2.5"/>
      <!-- right foot -->
      <ellipse cx="52" cy="87" rx="10" ry="6" fill="#C084FC" stroke="#222" stroke-width="2.5"/>

      <!-- helmet outer ring -->
      <circle cx="40" cy="36" r="32" fill="#C084FC" stroke="#222" stroke-width="4"/>
      <!-- visor -->
      <circle cx="40" cy="36" r="24" fill="#ffe8d0" stroke="#444" stroke-width="2"/>
      <!-- glare -->
      <ellipse cx="30" cy="24" rx="7" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-25 30 24)"/>

      <!-- LEFT EYE -->
      <ellipse cx="30" cy="37" rx="6" ry="7" fill="white" stroke="#222" stroke-width="1.5"/>
      <circle cx="30" cy="37" r="4" fill="#222"/>
      <circle cx="31.5" cy="35" r="1.8" fill="white"/>
      <!-- RIGHT EYE -->
      <ellipse cx="50" cy="37" rx="6" ry="7" fill="white" stroke="#222" stroke-width="1.5"/>
      <circle cx="50" cy="37" r="4" fill="#222"/>
      <circle cx="51.5" cy="35" r="1.8" fill="white"/>

      <!-- blush -->
      <ellipse cx="20" cy="44" rx="5.5" ry="3" fill="#D8B4FE" opacity="0.7"/>
      <ellipse cx="60" cy="44" rx="5.5" ry="3" fill="#D8B4FE" opacity="0.7"/>

      <!-- smile -->
      <path d="M31 47 Q40 54 49 47" stroke="#555" stroke-width="2.5" fill="none" stroke-linecap="round"/>

      <!-- little horns on top -->
      <ellipse cx="27" cy="9" rx="5" ry="9" fill="#C084FC" stroke="#222" stroke-width="2" transform="rotate(-15 27 9)"/>
      <ellipse cx="53" cy="9" rx="5" ry="9" fill="#C084FC" stroke="#222" stroke-width="2" transform="rotate(15 53 9)"/>
    </svg>
    <div class="nametag" style="color:#d8b4fe;">MAE</div>
  </div>

</div>

<p class="subtitle" style="margin-top:4px;">Jez = pink 🩷 bow on helmet &nbsp;|&nbsp; Mae = purple 💜 little horns</p>
<p class="subtitle">Happy with this? Let me know if you want different colors or accessories!</p>

</body>
</html>
