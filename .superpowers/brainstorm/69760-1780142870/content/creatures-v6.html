<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characters v6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 40px 20px;
  }
  h2 { font-size: 1.4rem; text-align: center; }
  .subtitle { color: #aaa; font-size: 0.9rem; text-align: center; }

  .stage {
    background: linear-gradient(180deg, #aee4ff 0%, #d6f0ff 55%, #5cb85c 55%, #3a8a3a 100%);
    border-radius: 24px;
    width: 100%; max-width: 540px;
    height: 280px;
    position: relative;
    overflow: hidden;
    border: 4px solid #333;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.95; }

  .tile {
    position: absolute; bottom: 0;
    width: 60px; height: 60px;
    background: #5cb85c;
    border-top: 5px solid #7dcc7d;
    border-left: 3px solid #7dcc7d;
    border-right: 3px solid #3a7a30;
    border-bottom: 3px solid #3a7a30;
  }

  .char {
    position: absolute;
    bottom: 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .name {
    font-size: 11px; font-weight: bold; letter-spacing: 2px;
    background: rgba(0,0,0,0.55);
    border-radius: 20px; padding: 3px 12px;
  }

  @keyframes idle  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes idle2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

  /* big preview */
  .big-preview {
    display: flex;
    gap: 60px;
    align-items: center;
    justify-content: center;
  }
  .big-char {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .big-name {
    font-size: 16px; font-weight: bold; letter-spacing: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px; padding: 5px 20px;
  }
</style>
</head>
<body>

<h2>Jez & Mae 💕</h2>
<p class="subtitle">Exact same character — just recolored</p>

<!-- BIG CLOSE UP -->
<div class="big-preview">

      <circle cx="40" cy="52" r="2" fill="white" opacity="0.9"/>

      <circle cx="64" cy="52" r="2" fill="white" opacity="0.9"/>

      <!-- SMILE -->

      <!-- bow on top -->

      <path d="M66 16 L52 23 L66 30 Z" fill="#FF3D7F" stroke="#1a1a1a" stroke-width="2.5"/>

      <!-- right leg stub -->

      <!-- BODY -->
      <circle cx="50" cy="58" r="44" fill="#A855F7" stroke="#1a1a1a" stroke-width="4"/>

      <!-- HELMET RING -->

      <!-- visor glare -->
      <ellipse cx="38" cy="42" rx="8" ry="5" fill="rgba(255,255,255,0.28)" transform="rotate(-20 38 42)"/>

      <!-- LEFT EYE -->
      <ellipse cx="38" cy="55" rx="5" ry="5.5" fill="#1a1a1a"/>
      <circle cx="40" cy="52" r="2" fill="white" opacity="0.9"/>

      <!-- RIGHT EYE -->
      <ellipse cx="62" cy="55" rx="5" ry="5.5" fill="#1a1a1a"/>
      <circle cx="64" cy="52" r="2" fill="white" opacity="0.9"/>

      <!-- SMILE -->

      <!-- star on top -->
      <text x="50" y="20" text-anchor="middle" font-size="20" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.4))">⭐</text>
    </svg>
    <div class="big-name" style="color:#e9d5ff;">MAE</div>
  </div>

</div>
